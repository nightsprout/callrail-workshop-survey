<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect for /callrail-workshop-survey/ base path
    var basePath = '/callrail-workshop-survey';
    var path = window.location.pathname;
    // Strip the base path to get the route
    var route = path.startsWith(basePath) ? path.slice(basePath.length) : path;
    if (!route) route = '/';
    window.location.replace(basePath + '/?route=' + encodeURIComponent(route));
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
